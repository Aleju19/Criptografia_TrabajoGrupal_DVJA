services:
  mysql:
    image: mysql:5.5
    restart: unless-stopped
    volumes:
      - mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

  app:
    build: .
    depends_on:
      - mysql
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

volumes:
  mysql: